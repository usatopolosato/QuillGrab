{% extends "base.html" %}
{% block title %}Проект: {{ project.name }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>{{ project.name }}</h1>
    <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">К списку</a>
</div>
<p>Страниц: {{ project.pages }}</p>

<div class="row">
    {% for page_num in pages %}
    <div class="col-md-3 col-sm-4 col-6 mb-3">
        <div class="card">
            <a href="{{ url_for('main.annotate', project_id=project_id, page=page_num) }}">
                <img src="{{ url_for('main.serve_page_image', project_id=project_id, page=page_num) }}"
                     class="card-img-top" alt="Страница {{ page_num }}" style="height:200px; object-fit: cover;">
            </a>
            <div class="card-body text-center">
                <small>Страница {{ page_num }}</small>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<!-- Кнопки -->
<div class="mt-4">
    <a href="{{ url_for('main.digitize_page', project_id=project_id) }}" class="btn btn-primary">Начать оцифровку</a>
    <button id="generateDocxBtn" class="btn btn-warning" disabled>
        Создать цифровую копию
    </button>
    <div id="generateResult" class="mt-2"></div>
    <div id="statusInfo" class="mt-2"></div>
</div>

<script>
// Проверяем статус оцифровки при загрузке страницы
function checkDigitizationStatus() {
    fetch('{{ url_for('main.api_digitize_status', project_id=project_id) }}')
        .then(response => response.json())
        .then(status => {
            const btn = document.getElementById('generateDocxBtn');
            const statusInfo = document.getElementById('statusInfo');

            if (status.status === 'done') {
                btn.disabled = false;
                statusInfo.innerHTML = '<div class="alert alert-success">Оцифровка завершена! Можно создать цифровую копию.</div>';
            } else if (status.status === 'processing') {
                btn.disabled = true;
                statusInfo.innerHTML = '<div class="alert alert-info">Идёт оцифровка... Подождите завершения.</div>';
                // Периодически проверяем статус
                setTimeout(checkDigitizationStatus, 3000);
            } else if (status.status === 'not_started') {
                btn.disabled = true;
                statusInfo.innerHTML = '<div class="alert alert-warning">Оцифровка не начата. Сначала запустите оцифровку.</div>';
            } else if (status.status === 'error') {
                btn.disabled = true;
                statusInfo.innerHTML = `<div class="alert alert-danger">Ошибка оцифровки: ${status.message || 'неизвестная ошибка'}</div>`;
            } else {
                btn.disabled = true;
                statusInfo.innerHTML = '<div class="alert alert-secondary">Статус оцифровки неизвестен.</div>';
            }
        })
        .catch(error => {
            console.error('Ошибка проверки статуса:', error);
            document.getElementById('statusInfo').innerHTML = '<div class="alert alert-danger">Ошибка проверки статуса оцифровки</div>';
        });
}

document.getElementById('generateDocxBtn').addEventListener('click', function() {
    const btn = this;
    btn.disabled = true;
    btn.textContent = 'Генерация...';
    const resultDiv = document.getElementById('generateResult');
    resultDiv.innerHTML = '<div class="alert alert-info">Экспорт тренировочных данных и создание цифровой копии...</div>';

    // Сначала экспортируем тренировочные данные
    fetch('{{ url_for('main.api_export_training_data', project_id=project_id) }}', {
        method: 'POST'
    })
    .then(response => response.json())
    .then(exportData => {
        if (exportData.status !== 'success') {
            throw new Error(exportData.error || 'Ошибка экспорта данных');
        }
        resultDiv.innerHTML = `<div class="alert alert-info">Экспортировано: детекция — ${exportData.stats.detection_pages} страниц, OCR — ${exportData.stats.ocr_lines} строк. Генерация DOCX...</div>`;
        return fetch('{{ url_for('main.api_generate_docx', project_id=project_id) }}', {
            method: 'POST'
        });
    })
    .then(response => {
        if (!response.ok) {
            return response.json().then(data => {
                throw new Error(data.error || 'Ошибка генерации DOCX');
            });
        }
        return response.blob();
    })
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '{{ project.name }}.docx';
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
        btn.disabled = false;
        btn.textContent = 'Создать цифровую копию';
        resultDiv.innerHTML = '<div class="alert alert-success">Цифровая копия создана и скачана! Тренировочные данные сохранены.</div>';
    })
    .catch(error => {
        btn.disabled = false;
        btn.textContent = 'Создать цифровую копию';
        resultDiv.innerHTML = `<div class="alert alert-danger">Ошибка: ${error.message}</div>`;
    });
});

// Запускаем проверку статуса при загрузке страницы
document.addEventListener('DOMContentLoaded', checkDigitizationStatus);
</script>
{% endblock %}
