{% extends "base.html" %}
{% block title %}Проект: {{ project.name }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>{{ project.name }}</h1>
    <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">К списку</a>
</div>
<p>Страниц: {{ project.pages }}</p>

<div class="row">
    {% for page_num in pages %}
    <div class="col-md-3 col-sm-4 col-6 mb-3">
        <div class="card">
            <a href="{{ url_for('main.annotate', project_id=project_id, page=page_num) }}">
                <img src="{{ url_for('main.serve_page_image', project_id=project_id, page=page_num) }}"
                     class="card-img-top" alt="Страница {{ page_num }}" style="height:200px; object-fit: cover;">
            </a>
            <div class="card-body text-center">
                <small>Страница {{ page_num }}</small>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<!-- Кнопки -->
<div class="mt-4">
    <a href="{{ url_for('main.digitize_page', project_id=project_id) }}" class="btn btn-primary">Начать оцифровку</a>
    <button id="exportBtn" class="btn btn-success">Выгрузить тренировочные данные</button>

    <!-- Новая кнопка для создания цифровой копии -->
    <button id="generateDocxBtn" class="btn btn-warning">
        Создать цифровую копию
    </button>

    <div id="exportResult" class="mt-2"></div>
    <div id="generateResult" class="mt-2"></div>
</div>

<script>
document.getElementById('exportBtn').addEventListener('click', function() {
    const btn = this;
    btn.disabled = true;
    btn.textContent = 'Экспорт...';
    fetch('{{ url_for('main.api_export_training_data', project_id=project_id) }}', {
        method: 'POST'
    })
    .then(response => response.json())
    .then(data => {
        btn.disabled = false;
        btn.textContent = 'Выгрузить тренировочные данные';
        const resultDiv = document.getElementById('exportResult');
        if (data.status === 'success') {
            resultDiv.innerHTML = `<div class="alert alert-success">
                Экспорт завершён: детекция — ${data.stats.detection_pages} страниц, OCR — ${data.stats.ocr_lines} строк.
            </div>`;
        } else {
            resultDiv.innerHTML = `<div class="alert alert-danger">Ошибка: ${data.error}</div>`;
        }
    })
    .catch(error => {
        btn.disabled = false;
        btn.textContent = 'Выгрузить тренировочные данные';
        document.getElementById('exportResult').innerHTML = `<div class="alert alert-danger">Ошибка запроса: ${error}</div>`;
    });
});

// Новая кнопка для создания цифровой копии
document.getElementById('generateDocxBtn').addEventListener('click', function() {
    const btn = this;
    btn.disabled = true;
    btn.textContent = 'Генерация...';
    document.getElementById('generateResult').innerHTML = '<div class="alert alert-info">Генерация цифровой копии...</div>';

    fetch('{{ url_for('main.api_generate_docx', project_id=project_id) }}', {
        method: 'POST'
    })
    .then(response => {
        if (!response.ok) {
            return response.json().then(data => {
                throw new Error(data.error || 'Ошибка генерации');
            });
        }
        // Если успешно, скачиваем файл
        return response.blob().then(blob => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '{{ project.name }}.docx';
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
            btn.disabled = false;
            btn.textContent = 'Создать цифровую копию';
            document.getElementById('generateResult').innerHTML = '<div class="alert alert-success">Цифровая копия создана и скачана!</div>';
        });
    })
    .catch(error => {
        btn.disabled = false;
        btn.textContent = 'Создать цифровую копию';
        document.getElementById('generateResult').innerHTML = `<div class="alert alert-danger">Ошибка: ${error.message}</div>`;
    });
});
</script>
{% endblock %}
